services:
  postgres:
    image: postgres:16
    container_name: sm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-sales_behavior}
      # TZ: Asia/Ho_Chi_Minh
      PGTZ: Asia/Ho_Chi_Minh
    command: ["postgres", "-c", "timezone=Asia/Ho_Chi_Minh"]
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-sales_behavior}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - sm-net

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sm-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: Asia/Ho_Chi_Minh
      PORT: ${PORT:-3001}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-sales_behavior}
      DATABASE_URL: ""
      DB_SYNC: ${DB_SYNC:-false}
    ports:
      - "${APP_PORT:-3001}:${PORT:-3001}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sm-net

volumes:
  postgres_data:

networks:
  sm-net:
    driver: bridge
