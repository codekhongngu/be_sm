  /dashboard/behavior-analytics:
    get:
      tags: [Dashboard]
      summary: Behavior analytics
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Analytics
          content:
            application/json:
              schema:
                type: object
  /evaluations:
    post:
      tags: [Evaluations]
      summary: Create evaluation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
  /evaluations/{journalId}:
    patch:
      tags: [Evaluations]
      summary: Update evaluation by journal
      security:
        - bearerAuth: []
      parameters:
        - name: journalId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
  /evaluations/{journalId}/awareness:
    patch:
      tags: [Evaluations]
      summary: Submit awareness form
      security:
        - bearerAuth: []
      parameters:
        - name: journalId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
  /evaluations/{journalId}/standards:
    patch:
      tags: [Evaluations]
      summary: Submit standards form
      security:
        - bearerAuth: []
      parameters:
        - name: journalId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
  /evaluations/pending/list:
    get:
      tags: [Evaluations]
      summary: Pending evaluations
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Pending list
          content:
            application/json:
              schema:
                type: array
