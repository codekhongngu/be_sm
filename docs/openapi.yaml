openapi: 3.0.3
info:
  title: SM Backend API
  version: 1.0.0
  description: API spec generated from current source controllers.
servers:
  - url: http://localhost:3000
    description: Local NestJS
  - url: https://be-sm.codekhongngu.workers.dev
    description: Cloudflare Worker
tags:
  - name: App
  - name: Auth
  - name: Catalogs
  - name: Dashboard
  - name: Evaluations
  - name: Journals
  - name: Users
paths:
  /:
    get:
      tags: [App]
      summary: Health root
      responses:
        "200":
          description: OK
  /auth/register:
    post:
      tags: [Auth]
      summary: Register user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /catalogs:
    get:
      tags: [Catalogs]
      summary: Get catalogs
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Catalog list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
    post:
      tags: [Catalogs]
      summary: Create catalog
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
  /catalogs/{id}:
    patch:
      tags: [Catalogs]
      summary: Update catalog
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
  /catalogs/{id}/deactivate:
    patch:
      tags: [Catalogs]
      summary: Deactivate catalog
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Deactivated
          content:
            application/json:
              schema:
                type: object
  /dashboard/metrics:
    get:
      tags: [Dashboard]
      summary: Dashboard metrics
      security:
